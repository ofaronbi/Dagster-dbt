source: LOCAL
target: MySQL_conn

defaults:
  mode: full-refresh
  object: 'f1_raw.{stream_file_name}'

streams:
  # expand all files into individual streams, each file will load into its own table
  # "file:////Users/opeyemifaronbi/Desktop/dagstar/f1db_csv/*.csv":
  #   object: 'f1_raw.{stream_file_name}'
  #   columns:
  #     "*": string
  #   source_options:
  #     format: csv

  "file:////Users/opeyemifaronbi/Desktop/dagstar/f1db_csv/circuits.csv":
      object: 'f1_raw.circuits'  
      columns:
        "*": string
      source_options:
        format: csv
    

  "file:////Users/opeyemifaronbi/Desktop/dagstar/f1db_csv/status.csv":
